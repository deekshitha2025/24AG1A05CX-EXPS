<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather App</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow text-center weather-box" style="width:400px;">

    <h2 class="mb-3">🌤 Weather App</h2>

    <input type="text" id="city" class="form-control mb-3" placeholder="Enter City Name">

    <button class="btn btn-primary w-100 mb-3" onclick="getWeather()">
      Get Weather
    </button>

    <div id="result"></div>

    <canvas id="weatherChart" style="margin-top:20px;"></canvas>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
